<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 Нэрээ бичээд ерөөлөө аваарай!</title>
    <meta property="og:title" content="🎉 Нэрээ бичээд ерөөлөө аваарай!">
    <meta property="og:description" content="3... 2... 1... 🎆 Сурпрайз ерөөл чамайг хүлээж байна! Нэрээ оруулаад ерөөлөө аваарай!">
    <meta property="og:image" content="https://tuguldur0107.github.io/surprise-app/og-image.png">
    <meta property="og:url" content="https://tuguldur0107.github.io/surprise-app/">
    <meta property="og:type" content="website">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a1a2e;
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .container {
            text-align: center;
            z-index: 10;
            position: relative;
        }
        h1 { font-size: 2rem; margin-bottom: 1.5rem; padding: 0 1rem; }
        input {
            padding: 12px 20px;
            font-size: 1.2rem;
            border: 2px solid #e94560;
            border-radius: 30px;
            background: transparent;
            color: white;
            outline: none;
            width: 280px;
            text-align: center;
        }
        input::placeholder { color: #888; }
        button {
            display: block;
            margin: 1rem auto 0;
            padding: 12px 40px;
            font-size: 1.1rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        #spreadMsg {
            display: none;
            margin-top: 1rem;
            font-size: 0.95rem;
            color: #aaa;
            padding: 0 1rem;
        }
        #shareBtn {
            display: none;
            margin: 1rem auto 0;
            padding: 10px 30px;
            font-size: 1rem;
            background: #1877F2;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #shareBtn:hover { transform: scale(1.05); }
        #message {
            margin-top: 2rem;
            font-size: 1.4rem;
            font-weight: bold;
            min-height: 80px;
            line-height: 1.4;
            padding: 0 1rem;
            word-break: keep-all;
        }
        #message.blessing {
            animation: popIn 0.6s ease forwards;
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }
        .countdown {
            font-size: 4rem;
            margin-top: 2rem;
            animation: pulse 0.5s ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-8px); }
            80% { transform: translateX(8px); }
        }
        canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 20;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="container">
        <h1>Сурпрайз апп 🎉</h1>
        <form id="surpriseForm" onsubmit="event.preventDefault(); encourage();">
            <input type="text" id="nameInput" placeholder="Нэрээ оруулна уу..." />
            <button type="submit">Сурпрайз!</button>
        </form>
        <div id="message"></div>
        <p id="spreadMsg"></p>
        <button id="shareBtn" onclick="shareToFB()">Facebook-д хуваалцах</button>
    </div>

    <script>
        const messages = [
            "амжилт бүхэн хөлд тань ирэхийг ерөөе! 🍀",
            "аз жаргал үргэлж дагахыг ерөөе! 😊",
            "эрүүл энх, сайн сайхан байхыг ерөөе! 🙏",
            "бүх мөрөөдөл тань биелэхийг ерөөе! 🌈",
            "амьдрал тань баяр хөөрөөр дүүрэхийг ерөөе! 🎊",
            "хайр дурлал үргэлж тойрохыг ерөөе! ❤️",
            "сэтгэл тань үргэлж цэлмэг байхыг ерөөе! ☀️",
            "зам тань цэцэгсээр дүүрэхийг ерөөе! 🌸",
            "гэр бүл тань энх тайван байхыг ерөөе! 🏡",
            "ажил хэрэг тань өндөрлөхийг ерөөе! 🚀",
            "амьдрал тань энэ жил тэсрэлт хийж, аз тань ар араасаа ирэх болтугай! 💥",
            "хайсан боломжууд тань өөрсдөө хаалгыг тань тогших болтугай! 🚪✨",
            "мөрөөдөл тань айхаа больж, бодит байдал болох болтугай! 🔥",
            "нэр тань амжилтын жагсаалтад бичигдэх болтугай! 🏆",
            "бүтэлгүйтэл бүр шат ахих шат болох болтугай! 📈",
            "орлого тань санаанд оромгүйгээр өсөх болтугай! 💰",
            "зориг тань бусдаас ялгаруулах болтугай! 🦁",
            "аз тань дагаж, бусад нь таныг дагах болтугай! 🌠",
            "зүрх сэтгэл тань амар амгалангаар дүүрэн байх болтугай! 🌿",
            "хайрладаг хүмүүс тань үргэлж дэргэд тань байх болтугай! 🤍",
            "нулимс тань баярынх байх болтугай! 🥹✨",
            "гэр бүл тань инээдээр дүүрэн байх болтугай! 🏡",
            "сэтгэл тань шархгүй, итгэл тань бөх байх болтугай! 🕊️",
            "өнөөдрийн жижиг алхам маргаашийн том ялалт болох болтугай! 🌅",
            "шийдвэр бүр тань зөв цагтаа, зөв үр дүнд хүргэх болтугай! 🎯",
            "хөрөнгө тань ухаалаг өсөж, нэр хүнд тань батжих болтугай! 📊",
            "систем тань оролцоогүйгээр ч амжилт авчрах болтугай! ⚙️",
            "баг тань алсын харааг бодит болгох болтугай! 👥",
            "брэнд тань зах зээлд өөрийн байр сууриа эзлэх болтугай! 🏔️",
            "хөдөлмөр тань compound өсөлт авчрах болтугай! 📈",
            "аз таныг сонгосон! ✨",
            "таны цаг ирлээ! ⏳🔥",
            "та ялна. Цэг. 🏆",
            "мөрөөдөл тань айгаагүй! 💫",
            "та илүүг хүртэх эрхтэй! 💎",
            "өнөөдрөөс эхэлнэ! 🚀",
            "энерги тань өсч байна! ⚡",
        ];

        let running = false;
        function encourage() {
            const name = document.getElementById("nameInput").value.trim();
            if (!name || running) return;
            running = true;
            const msgEl = document.getElementById("message");
            const container = document.querySelector(".container");
            msgEl.classList.remove("blessing");
            msgEl.textContent = "";

            // countdown 3, 2, 1
            let count = 3;
            function tick() {
                msgEl.innerHTML = `<span class="countdown">${count}</span>`;
                container.style.animation = "shake 0.4s";
                setTimeout(() => container.style.animation = "", 400);
                if (count > 1) {
                    count--;
                    setTimeout(tick, 700);
                } else {
                    setTimeout(() => {
                        const msg = messages[Math.floor(Math.random() * messages.length)];
                        msgEl.textContent = `${name} Таньд ${msg}`;
                        msgEl.classList.add("blessing");
                        launchFireworks();
                        document.getElementById("spreadMsg").textContent = "Ерөөлөө бусдадаа ч түгээгээрэй 👇";
                        document.getElementById("spreadMsg").style.display = "block";
                        document.getElementById("shareBtn").style.display = "block";
                        running = false;
                    }, 700);
                }
            }
            tick();
        }


        function shareToFB() {
            const text = document.getElementById("message").textContent;
            const siteUrl = "https://tuguldur0107.github.io/surprise-app/";
            const shareText = text + "\n\n🎉 Чи ч ерөөлөө аваарай 👉 " + siteUrl;
            const url = "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(siteUrl) + "&quote=" + encodeURIComponent(shareText);
            window.open(url, "_blank", "width=600,height=400");
        }

        // Fireworks
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        let particles = [];
        let animating = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();

        function randomColor() {
            const colors = ["#e94560","#f5a623","#50e3c2","#b8e986","#ff6b6b","#ffd93d","#6bcb77","#4d96ff","#ff6fff"];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function launchFireworks() {
            createBurst(Math.random() * canvas.width, Math.random() * canvas.height * 0.6 + 50);
            for (let i = 1; i < 12; i++) {
                setTimeout(() => createBurst(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height * 0.6 + 50
                ), i * 200);
            }
            if (!animating) { animating = true; animate(); }
        }

        function createBurst(x, y) {
            for (let i = 0; i < 60; i++) {
                const angle = (Math.PI * 2 / 60) * i;
                const speed = 3 + Math.random() * 5;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    color: randomColor(),
                    size: 2 + Math.random() * 3,
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.04;
                p.life -= 0.015;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            if (particles.length > 0) {
                requestAnimationFrame(animate);
            } else {
                animating = false;
            }
        }
    </script>
</body>
</html>
